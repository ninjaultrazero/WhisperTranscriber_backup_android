plugins {
    id("com.android.application")
    id("org.jetbrains.kotlin.android")
    id("com.facebook.react")
}

react {
    autolinkLibrariesWithApp()
    newArchEnabled = false
    hermesEnabled = true
}

android {
    ndkVersion "27.0.12077973"
    compileSdk 34
    namespace "com.whispertranscriber"

    defaultConfig {
        applicationId "com.whispertranscriber"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"

        // Fondamentale per Whisper (C++)
        externalNativeBuild {
            cmake {
                abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
                arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            }
        }
    }

    // Serve per compilare il codice nativo di Whisper
    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
            keepDebugSymbols += ["**/*.so"]
        }
        // Risolve i conflitti di librerie duplicate tra RN e FFmpeg
        resources {
            pickFirsts += [
                    '**/libc++_shared.so',
                    '**/libfbjni.so',
                    '**/libreactnativejni.so',
                    '**/libjscexecutor.so',
                    '**/libhermes.so'
            ]
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    // FFmpeg con supporto 16KB
    implementation 'com.moizhassan.ffmpeg:ffmpeg-kit-16kb:6.1.1'

    implementation 'com.arthenica:smart-exception-java:0.2.1'

    // Colleghiamo il modulo bridge
    implementation(project(':ffmpeg-kit-react-native'))

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"