plugins {
    id("com.android.application")
    id("org.jetbrains.kotlin.android")
    id("com.facebook.react")
}

react {
    autolinkLibrariesWithApp()
}

def hermesEnabled = true

android {
    ndkVersion rootProject.ext.ndkVersion
    compileSdkVersion rootProject.ext.compileSdkVersion
    namespace "com.whispertranscriber"

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            manifestPlaceholders = [usesCleartextTraffic: "true"]
        }
        release {
            // Se non hai un keystore di release, usa quello di debug per ora
            signingConfig signingConfigs.debug
            minifyEnabled false
            manifestPlaceholders = [usesCleartextTraffic: "false"]
        }
    }

    defaultConfig {
        applicationId "com.whispertranscriber"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"

        buildConfigField("boolean", "IS_NEW_ARCHITECTURE_ENABLED", "false")
        buildConfigField("boolean", "IS_HERMES_ENABLED", "true")
    }

    buildFeatures {
        prefab true
        buildConfig true
    }

    // Serve per compilare il codice nativo di Whisper (Rimosso perché causa errore se non ci sono sorgenti in legacy mode)


    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
            keepDebugSymbols += ["**/*.so"]
            pickFirsts += [
                    '**/libc++_shared.so',
                    '**/libfbjni.so',
                    '**/libreactnativejni.so',
                    '**/libjscexecutor.so',
                    '**/libhermes.so'
            ]
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android:0.76.5")

    // FFmpeg con supporto 16KB
    implementation 'com.moizhassan.ffmpeg:ffmpeg-kit-16kb:6.1.1'

    implementation 'com.arthenica:smart-exception-java:0.2.1'

    // Colleghiamo il modulo bridge
    implementation(project(':ffmpeg-kit-react-native'))

    if (hermesEnabled) {
        implementation("com.facebook.react:hermes-android:0.76.5")
    } else {
        implementation jscFlavor
    }
}

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"