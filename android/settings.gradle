pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
    includeBuild("../node_modules/@react-native/gradle-plugin")
}

plugins {
    id("com.facebook.react.settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> ex.autolinkLibrariesFromCommand() }

rootProject.name = 'WhisperTranscriber'
include ':app'
include ':ffmpeg-kit-react-native'
project(':ffmpeg-kit-react-native').projectDir = new File(rootProject.projectDir, '../node_modules/ffmpeg-kit-react-native/android')

dependencyResolutionManagement {
    // Cambia da PREFER_SETTINGS a PREFER_PROJECT
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    repositories {
        google()
        mavenCentral()
    }
}